version: 2
updates:
  # 1. Keep GitHub Actions up to date
  # - package-ecosystem: "github-actions"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"

  # 2. Keep npm dependencies up to date
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly" # Changed to weekly to further reduce "spam"
    open-pull-requests-limit: 5 # Increased slightly since they are grouped now
    groups:
      # Groups all production dependencies (stuff in 'dependencies')
      production-dependencies:
        dependency-type: "production"
      # Groups all development dependencies (stuff in 'devDependencies')
      development-dependencies:
        dependency-type: "development"